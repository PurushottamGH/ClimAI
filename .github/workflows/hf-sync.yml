name: Sync to Hugging Face Hub

on:
  push:
    branches: [main]

  # to run this workflow manually from the Actions tab
  workflow_dispatch:

jobs:
  sync-to-hub:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
        with:
          fetch-depth: 0
          lfs: true

      - name: Install huggingface_hub
        run: pip install huggingface_hub

      - name: Sync to Hugging Face
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: |
          python -c "from huggingface_hub import HfApi; api = HfApi(token='$HF_TOKEN'); api.upload_folder(folder_path='backend', repo_id='ipurushottam/climai', repo_type='space', ignore_patterns=['.git/*','node_modules/*','__pycache__/*','.venv/*','*.pyc'])"
